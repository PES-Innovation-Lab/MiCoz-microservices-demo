apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedcontroller
  labels:
    app: speedcontroller
spec:
  selector:
    matchLabels:
      app: speedcontroller
  template:
    metadata:
      labels:
        app: speedcontroller
    spec:
      serviceAccountName: speedcontroller
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        image: speedcontroller
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        - name: COLLECTOR_SERVICE_ADDR
          value: "jaeger:4317"
        - name: ENABLE_TRACING
          value: "1"
        - name: OTEL_SERVICE_NAME
          value: "speedcontroller"
        readinessProbe:
          periodSeconds: 5
          grpc:
            port: 8000
        livenessProbe:
          periodSeconds: 5
          grpc:
            port: 8000
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: speedcontroller
  labels:
    app: speedcontroller
spec:
  type: NodePort
  selector:
    app: speedcontroller
  ports:
  - name: grpc
    port: 8000
    targetPort: 8000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: speedcontroller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delay-store
  labels:
    app: delay-store
spec:
  selector:
    matchLabels:
      app: delay-store
  template:
    metadata:
      labels:
        app: delay-store
    spec:
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: redis
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        image: redis:alpine
        ports:
        - containerPort: 6379
        readinessProbe:
          periodSeconds: 5
          tcpSocket:
            port: 6379
        livenessProbe:
          periodSeconds: 5
          tcpSocket:
            port: 6379
        volumeMounts:
        - mountPath: /data
          name: redis-data
        resources:
          limits:
            memory: 256Mi
            cpu: 125m
          requests:
            cpu: 70m
            memory: 200Mi
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: delay-store
  labels:
    app: delay-store
spec:
  type: ClusterIP
  selector:
    app: delay-store
  ports:
  - name: tcp-redis
    port: 6379
    targetPort: 6379
